name: Deploy Paircel Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    name: Verify Paircel Bot Source
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          test -f api/whatsapp.js
          test -f README.md || true
          echo "Paircel bot source verified."

      - name: Confirm Vercel handles deployment
        run: |
          echo "No Supabase CLI is used."
          echo "No Supabase Edge deployment is used."
          echo "Production deployment is handled by Vercel from the main branch."
